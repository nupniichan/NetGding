services:
  discord:
    build:
      context: .
      dockerfile: NetGding.Services/NetGding.Discord/Dockerfile
    container_name: netgding-discord
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: http://+:8080
      Discord__CollectorBaseUrl: http://collector:8081
      Discord__WebApiBaseUrl: http://webapi:8080
    ports:
      - "5003:8080"
    restart: unless-stopped

  telegram:
    build:
      context: .
      dockerfile: NetGding.Services/NetGding.Telegram/Dockerfile
    container_name: netgding-telegram
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: http://+:8080
      Telegram__CollectorBaseUrl: http://collector:8081
      Telegram__WebApiBaseUrl: http://webapi:8080
    ports:
      - "5002:8080"
    restart: unless-stopped

  webapi:
    build:
      context: .
      dockerfile: NetGding.Services/NetGding.WebAPI/Dockerfile
    container_name: netgding-webapi
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: http://+:8080
      WebApi__TelegramServiceUrl: http://telegram:8080
      WebApi__CollectorServiceUrl: http://collector:8081
    ports:
      - "5001:8080"
    restart: unless-stopped

  collector:
    build:
      context: .
      dockerfile: NetGding.Services/NetGding.Collector/Dockerfile
    container_name: netgding-collector
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: http://+:8081
      Collector__WebApiPublishEnabled: "true"
      Collector__WebApiBaseUrl: http://webapi:8080
      Collector__OutputDirectory: /app/data
    ports:
      - "5000:8081"
    volumes:
      - collector-data:/app/data
    restart: unless-stopped

volumes:
  collector-data:
